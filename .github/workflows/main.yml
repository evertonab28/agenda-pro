name: CI — Release Quality Gate

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ──────────────────────────────────────────
  # Job 1: PHP Tests (Feature + Unit)
  # ──────────────────────────────────────────
  php-tests:
    name: PHP Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: intl, mbstring, dom, curl, libxml, pdo_sqlite, bcmath, gd, zip
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Generate App Key
        run: php artisan key:generate

      - name: Set storage permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Create SQLite database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Run Migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force

      - name: Run Tests (Feature + Unit)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
          CACHE_DRIVER: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
        run: php artisan test --stop-on-failure

  # ──────────────────────────────────────────
  # Job 2: Frontend — Type Check + Build
  # ──────────────────────────────────────────
  frontend:
    name: Frontend (TypeScript + Build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

  # ──────────────────────────────────────────
  # Job 3: Release Gate (blocks merge if any job fails)
  # ──────────────────────────────────────────
  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    needs: [php-tests, frontend]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.php-tests.result }}" != "success" || "${{ needs.frontend.result }}" != "success" ]]; then
            echo "❌ Release Gate FAILED — one or more jobs did not succeed."
            exit 1
          fi
          echo "✅ All checks passed — safe to merge."
